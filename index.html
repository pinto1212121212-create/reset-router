<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>冒聼聰聞 脳聻脳垄脳聭脳篓 脳聹脳聬脳陇脳聹脳聶脳搂脳娄脳聶脳聰...</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:linear-gradient(180deg,#0a0805,#1a0f05);color:#fff;font-family:-apple-system,sans-serif;direction:rtl;display:flex;align-items:center;justify-content:center;padding:20px}
.box{max-width:420px;width:100%;text-align:center}
.spinner{width:60px;height:60px;border:4px solid rgba(251,171,32,0.2);border-top-color:#fbab20;border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
h1{color:#fbab20;font-size:24px;margin:0 0 8px}
.sub{color:rgba(255,255,255,0.6);font-size:14px;line-height:1.6;margin-bottom:16px}
.target{background:rgba(16,185,129,0.08);border:1px solid #10b981;border-radius:10px;padding:10px 14px;font-size:13px;color:#6ee7b7;font-family:monospace;word-break:break-all;margin-bottom:14px}
.fallback{display:none;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:18px;margin-top:18px;text-align:right}
.fallback.show{display:block}
.fallback-ttl{color:#fcd34d;font-weight:800;font-size:15px;margin-bottom:10px;text-align:center}
.fallback-body{font-size:13px;line-height:1.7;color:rgba(255,255,255,0.85)}
.btn{display:block;width:100%;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:800;margin:10px 0;box-shadow:0 4px 16px rgba(249,115,22,0.4);font-family:inherit;cursor:pointer;text-decoration:none;text-align:center}
.btn.purple{background:linear-gradient(135deg,#7c3aed,#5b21b6);box-shadow:0 4px 16px rgba(124,58,237,0.4)}
.err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.35);border-radius:10px;padding:12px;margin-top:14px;font-size:12.5px;color:#fca5a5;line-height:1.6;text-align:right}
.err b{color:#fecaca}
</style>
</head>
<body>

<div class="box">

<div id="loading-view">
  <div class="spinner"></div>
  <h1>冒聼聰聞 脳聻脳垄脳聭脳篓 脳聹脳聬脳陇脳聹脳聶脳搂脳娄脳聶脳聰...</h1>
  <div class="sub" id="sub-text">脳聻脳垄脳聭脳聯 脳聬脳陋 脳聰脳聭脳搂脳漏脳聰 脳聲脳聻脳垄脳聭脳聶脳篓 脳聬脳聲脳陋脳職 脳聹脳聬脳陇脳聹脳聶脳搂脳娄脳聶脳聰 脳聰脳聽脳聸脳聲脳聽脳聰</div>
  <div class="target" id="target-url" style="display:none"></div>
</div>

<div id="fallback-view" class="fallback">
  <div class="fallback-ttl">芒職聽茂赂聫 脳聻脳垄脳聭脳篓 脳聬脳聲脳聵脳聲脳聻脳聵脳聶 脳聽脳聸脳漏脳聹</div>
  <div class="fallback-body">
    脳聹脳聴脳楼 脳聶脳聯脳聽脳聶脳陋 脳垄脳聹 脳聰脳聬脳陇脳聹脳聶脳搂脳娄脳聶脳聰 脳聰脳聻脳陋脳聬脳聶脳聻脳聰:
  </div>
  <div id="fallback-buttons" style="margin-top:12px"></div>
  <div class="err" id="err-msg" style="display:none"></div>
</div>

</div>

<script>
(function(){
  // Known apps mapped to their GitHub Pages URLs
    const APPS = {
    'Mm.ll': 'https://pinto1212121212-create.github.io/Mm.ll/',
    'therapy-hodaya': 'https://pinto1212121212-create.github.io/therapy-hodaya/'
  };
  
  // Parse URL params
  const urlParams = new URLSearchParams(window.location.search);
  const mode = urlParams.get('mode') || '';
  const oobCode = urlParams.get('oobCode') || '';
  const apiKey = urlParams.get('apiKey') || '';
  const continueUrl = urlParams.get('continueUrl') || '';
  const lang = urlParams.get('lang') || 'he';
  
  function showError(msg, showAll){
    const el = document.getElementById('err-msg');
    el.innerHTML = msg;
    el.style.display = 'block';
    document.getElementById('loading-view').style.display = 'none';
    document.getElementById('fallback-view').classList.add('show');
    if(showAll){
      const buttonsEl = document.getElementById('fallback-buttons');
      buttonsEl.innerHTML = '';
      for(const name in APPS){
        const params = new URLSearchParams({
          mode: mode,
          oobCode: oobCode,
          apiKey: apiKey,
          lang: lang
        });
        const url = APPS[name] + '?' + params.toString();
        const btn = document.createElement('a');
        btn.className = name === 'therapy-hodaya' ? 'btn purple' : 'btn';
        btn.href = url;
        btn.textContent = '冒聼聰聴 ' + (name === 'therapy-hodaya' ? '脳聰脳聶脳聲脳聻脳聼 脳漏脳聹 脳聰脳聲脳聯脳聶脳聰' : name === 'Mm.ll' ? '脳聰脳聶脳聲脳聻脳聼 脳漏脳聹脳聽脳聲 (脳篓脳聶脳聽脳陋/脳聯脳聽脳聶脳聬脳聹)' : name);
        buttonsEl.appendChild(btn);
      }
    }
  }
  
  // Validate essentials
  if(!mode || !oobCode){
    showError('<b>脳陇脳篓脳聻脳聵脳篓脳聶脳聺 脳聴脳隆脳篓脳聶脳聺</b><br>脳聰脳聹脳聶脳聽脳搂 脳聹脳聬 脳聻脳聸脳聶脳聹 脳聬脳陋 脳聰脳陇脳篓脳聵脳聶脳聺 脳聰脳聽脳聯脳篓脳漏脳聶脳聺 (mode 脳聬脳聲 oobCode). 脳聰脳聲脳聬 脳聸脳聽脳篓脳聬脳聰 脳漏脳聭脳聲脳篓 脳聬脳聲 脳聴脳陋脳聲脳職.', true);
    return;
  }
  
  // Figure out target app from continueUrl
  let targetApp = null;
  let targetUrl = null;
  
  if(continueUrl){
    for(const name in APPS){
      if(continueUrl.indexOf(name) !== -1 || continueUrl.indexOf(APPS[name]) !== -1){
        targetApp = name;
        targetUrl = APPS[name];
        break;
      }
    }
  }
  
  // Fallback: default to Mm.ll if we can't determine
  if(!targetApp){
    targetApp = 'Mm.ll';
    targetUrl = APPS[targetApp];
    document.getElementById('sub-text').innerHTML = 
      '脳聹脳聬 脳聳脳聲脳聰脳陋脳聰 脳聬脳陇脳聹脳聶脳搂脳娄脳聶脳聰 脳聻脳聰脳聹脳聶脳聽脳搂. 脳聻脳垄脳聭脳聶脳篓 脳聹脳聭脳篓脳聶脳篓脳陋 脳聻脳聴脳聯脳聹.<br><small>脳聬脳聺 脳聳脳聲 脳聹脳聬 脳聰脳聬脳陇脳聹脳聶脳搂脳娄脳聶脳聰 脳漏脳篓脳娄脳聶脳陋 芒聙聰 脳聹脳聴脳楼 脳聹脳漏脳聹脳聲脳聴 脳聬脳聶脳陇脳聲脳隆 脳聴脳聯脳漏.</small>';
  }
  
  // Build the destination URL with all needed params
  const forwardParams = new URLSearchParams({
    mode: mode,
    oobCode: oobCode,
    apiKey: apiKey,
    lang: lang
  });
  const destination = targetUrl + '?' + forwardParams.toString();
  
  // Show target for 1 second, then redirect
  const targetEl = document.getElementById('target-url');
  targetEl.textContent = '芒聠聮 ' + (targetApp === 'therapy-hodaya' ? '脳聰脳聶脳聲脳聻脳聼 脳漏脳聹 脳聰脳聲脳聯脳聶脳聰' : targetApp === 'Mm.ll' ? '脳聰脳聶脳聲脳聻脳聼 脳漏脳聹脳聽脳聲 (脳篓脳聶脳聽脳陋/脳聯脳聽脳聶脳聬脳聹)' : targetApp);
  targetEl.style.display = 'block';
  
  // Set safety timeout: if redirect doesn't happen within 4 seconds, show manual fallback
  const safetyTimer = setTimeout(function(){
    showError('<b>脳聰脳聯脳陇脳聯脳陇脳聼 脳聴脳聲脳隆脳聺 脳聬脳陋 脳聰脳聻脳垄脳聭脳篓 脳聰脳聬脳聲脳聵脳聲脳聻脳聵脳聶.</b><br>脳聹脳聴脳楼 脳聶脳聯脳聽脳聶脳陋 脳垄脳聹 脳聰脳聸脳陇脳陋脳聲脳篓 脳聰脳聻脳陋脳聬脳聶脳聺 脳聹脳聻脳垄脳聹脳聰.', true);
  }, 4000);
  
  // Redirect after short visual delay
  setTimeout(function(){
    try{
      window.location.replace(destination);
    }catch(e){
      clearTimeout(safetyTimer);
      showError('<b>脳漏脳聮脳聶脳聬脳聰 脳聭脳聰脳陇脳聽脳聶脳聰:</b> ' + (e.message || 'unknown'), true);
    }
  }, 1000);
})();
</script>

</body>
</html>
